<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 bg-gray-100">

<h1 class="text-xl font-bold mb-4">房客電費</h1>

<button onclick="load()" class="bg-blue-500 text-white p-2 w-full mb-3">
讀取帳單
</button>

<div id="list"></div>

<script>
const GS="https://script.google.com/macros/s/AKfycbzW-Cv2scTGNwTv68xGhIpvYy5m0Hfn-bwWsLeRKdIRLnPuaooK8jRS4uiy6WTQnW4aXg/exec";

async function load(){
const data=await fetch(GS+"?action=getMeterRecords").then(r=>r.json());

list.innerHTML=data.map(d=>`
<div class="bg-white p-3 mb-2 rounded shadow">
<div class="font-bold">${d.locationName} ${d.roomName}</div>
<div>上期：${d.previousKwh}</div>
<div>本期：${d.currentKwh}</div>
<div>用量：${d.usedKwh}</div>
<div>單價：${d.unitPrice}</div>
<div class="text-green-600 font-bold">應繳：${d.tenantAmount}</div>
</div>
`).join("");
}
</script>

</body>
</html>
