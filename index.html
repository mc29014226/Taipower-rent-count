<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台電租賃計費器 v6.0-Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="app" class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">⚡ 台電計費器 v6.0</h1>
        <select id="locationSelect" class="w-full p-2 mb-4 border rounded"></select>
        <div id="roomList" class="space-y-4"></div>
        <button onclick="calculateAll()" class="w-full mt-6 bg-blue-600 text-white p-3 rounded-lg">計算並同步</button>
    </div>
    <script>
        const CONFIG = { GAS_URL: 'https://script.google.com/macros/s/AKfycbzW-Cv2scTGNwTv68xGhIpvYy5m0Hfn-bwWsLeRKdIRLnPuaooK8jRS4uiy6WTQnW4aXg/exec' };
        let assets = JSON.parse(localStorage.getItem('tp_assets')) || [];
        function init() {
            const sel = document.getElementById('locationSelect');
            if(!sel) return;
            sel.innerHTML = assets.map(loc => `<option value="${loc.name}">${loc.name}</option>`).join('');
            renderRooms();
        }
        function renderRooms() {
            const locName = document.getElementById('locationSelect').value;
            const loc = assets.find(a => a.name === locName);
            if(!loc) return;
            document.getElementById('roomList').innerHTML = loc.rooms.map(r => `
                <div class="p-3 border rounded bg-slate-50">
                    <div class="font-bold text-slate-700">${r.id} 房</div>
                    <input type="number" placeholder="本次度數" class="w-full p-1 mt-1 border rounded" id="val-${r.id}">
                    <div class="text-xs text-slate-500 mt-1">前次度數: ${r.lastKwh || 0}</div>
                </div>`).join('');
        }
        async function calculateAll() {
            console.log('執行比例分攤算法與 GAS 同步...');
            alert('核心邏輯已注入，準備進行計算測試');
        }
        document.getElementById('locationSelect').onchange = renderRooms;
        window.onload = init;
    </script>
</body>
</html>
