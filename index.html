<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台電租屋電費計算 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-xl shadow-lg border border-blue-500">
        <h1 class="text-2xl font-bold mb-4 text-blue-400">台電計費重構版</h1>
        <div class="space-y-4">
            <input id="kwh" type="number" placeholder="輸入度數" class="w-full p-2 bg-slate-700 rounded">
            <button onclick="calc()" class="w-full bg-blue-600 p-2 rounded hover:bg-blue-500">計算費用</button>
            <div id="res" class="text-xl font-mono mt-4"></div>
        </div>
    </div>
    <script>
        function calc() {
            const k = parseFloat(document.getElementById("kwh").value) || 0;
            let cost = 0;
            // 簡易 2026 累進邏輯範例 (假設 120度以下 1.63, 121-330度 2.38)
            if (k <= 120) cost = k * 1.63;
            else if (k <= 330) cost = 120 * 1.63 + (k - 120) * 2.38;
            else cost = 120 * 1.63 + 210 * 2.38 + (k - 330) * 3.52;
            document.getElementById("res").innerText = "預估金額: $" + Math.round(cost);
        }
    </script>
</body>
</html>
