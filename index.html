<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台電租屋公平分攤</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <div class="mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900">台電租屋公平分攤</h1>
        <p class="text-slate-500 mt-2">依本期台電總金額與各房用電，粗估每度單價並重算整組分攤。</p>
        <div class="mt-2 text-sm">
          <a href="./setup.html" class="text-blue-600 hover:underline">⚙️ 設定 / 管理房間資料</a>
        </div>
      </div>

      <div id="statusBar" class="mb-6 hidden rounded-xl px-4 py-3 text-sm font-medium"></div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium mb-2">地點</label>
          <select id="locationSelect" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white">
            <option value="">請選擇地點</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">帳單群組</label>
          <select id="billGroupSelect" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white" disabled>
            <option value="">請先選擇地點</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">台電總金額</label>
          <input id="billTotal" type="number" min="0" step="1" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white" placeholder="例如 4200" />
        </div>
      </div>

      <div class="mt-4">
        <label class="block text-sm font-medium mb-2">備註</label>
        <input id="remark" type="text" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white" placeholder="可空白" />
      </div>

      <div class="mt-6 flex flex-wrap gap-3">
        <button id="calculateBtn" class="rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 font-medium">
          計算整組分攤
        </button>
        <button id="syncBtn" class="rounded-xl bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 font-medium">
          同步整組抄表紀錄
        </button>
        <button id="reloadBtn" class="rounded-xl bg-slate-700 hover:bg-slate-800 text-white px-5 py-3 font-medium">
          重新載入資料
        </button>
      </div>

      <div class="mt-8 border-t pt-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-xl font-bold text-slate-900">群組房間資料</h2>
          <div class="text-sm text-slate-500">共 <span id="roomCountText">0</span> 間</div>
        </div>

        <div id="emptyGroupText" class="text-slate-400 text-sm">請先選擇地點與帳單群組</div>

        <div id="groupTableWrap" class="hidden overflow-x-auto">
          <table class="min-w-full border border-slate-200 rounded-xl overflow-hidden">
            <thead class="bg-slate-100">
              <tr>
                <th class="text-left px-4 py-3 border-b">房號</th>
                <th class="text-left px-4 py-3 border-b">上期度數</th>
                <th class="text-left px-4 py-3 border-b">本期度數</th>
                <th class="text-left px-4 py-3 border-b">本期使用度數</th>
                <th class="text-left px-4 py-3 border-b">公電費</th>
                <th class="text-left px-4 py-3 border-b">用電分攤金額</th>
                <th class="text-left px-4 py-3 border-b">租客應繳總額</th>
              </tr>
            </thead>
            <tbody id="groupTableBody" class="bg-white"></tbody>
          </table>
        </div>
      </div>

      <div id="summaryCard" class="mt-8 hidden rounded-2xl border border-emerald-200 bg-emerald-50 p-6">
        <h2 class="text-xl font-bold text-emerald-900 mb-4">整組計算結果</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm md:text-base">
          <div class="bg-white rounded-xl p-4 border border-emerald-100">
            <div class="text-slate-500">帳單群組總用電</div>
            <div id="groupTotalUsedText" class="text-2xl font-bold text-slate-900 mt-1">0 度</div>
          </div>
          <div class="bg-white rounded-xl p-4 border border-emerald-100">
            <div class="text-slate-500">台電總金額</div>
            <div id="billTotalText" class="text-2xl font-bold text-slate-900 mt-1">0 元</div>
          </div>
          <div class="bg-white rounded-xl p-4 border border-emerald-100">
            <div class="text-slate-500">本組應收合計</div>
            <div id="groupTenantTotalText" class="text-2xl font-bold text-emerald-700 mt-1">0 元</div>
          </div>
          <div class="bg-white rounded-xl p-4 border border-emerald-100">
            <div class="text-slate-500">本次每度單價</div>
            <div id="unitPriceText" class="text-2xl font-bold text-slate-900 mt-1">0 元</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
