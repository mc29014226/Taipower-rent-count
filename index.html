<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租屋電力雲 v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; } .page.active { display: block; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">
    <header class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center no-print">
        <h1 class="text-lg font-bold">Taipower Pro <span class="text-xs opacity-75">v5.0</span></h1>
        <div id="syncStatus" class="text-[10px] bg-indigo-800 px-2 py-1 rounded">雲端同步模式</div>
    </header>
    <div class="max-w-md mx-auto p-4">
        <section id="page-setup" class="page">
            <h2 class="text-xl font-black text-slate-800 mb-4">⚙️ 資產設定</h2>
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-200">
                <label class="text-[10px] font-bold text-slate-400">GAS API URL</label>
                <input id="cfgUrl" type="text" class="w-full text-sm border-b py-2 outline-none focus:border-indigo-500">
                <button onclick="saveCfg()" class="w-full mt-3 bg-indigo-50 text-indigo-600 font-bold py-2 rounded-lg text-sm">儲存設定</button>
            </div>
            <div id="assetContainer" class="space-y-4"></div>
            <button onclick="addLocation()" class="w-full mt-6 py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold">+ 新增房產地點</button>
        </section>
        <section id="page-input" class="page active">
            <h2 class="text-xl font-black text-slate-800 mb-4">⚡ 度數錄入</h2>
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 space-y-5">
                <select id="selLoc" onchange="updateRoomOptions()" class="w-full p-3 bg-slate-50 rounded-xl border-none ring-1 ring-slate-200"></select>
                <select id="selRoom" onchange="loadLastReadings()" class="w-full p-3 bg-slate-50 rounded-xl border-none ring-1 ring-slate-200"></select>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-3 rounded-2xl"><label class="text-[10px] text-slate-400">上次度數</label><input id="valPrev" type="number" readonly class="w-full bg-transparent font-mono font-bold outline-none"></div>
                    <div class="bg-indigo-50 p-3 rounded-2xl ring-1 ring-indigo-200"><label class="text-[10px] text-indigo-400">本次度數</label><input id="valCurr" type="number" oninput="calculate()" class="w-full bg-transparent font-mono font-bold outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="billTotal" type="number" placeholder="總金額" oninput="calculate()" class="p-3 bg-slate-50 rounded-xl text-sm outline-none ring-1 ring-slate-200">
                    <input id="billKwh" type="number" placeholder="總度數" oninput="calculate()" class="p-3 bg-slate-50 rounded-xl text-sm outline-none ring-1 ring-slate-200">
                </div>
                <div id="resultBox" class="hidden bg-slate-900 text-white p-5 rounded-2xl">
                    <div class="flex justify-between items-end border-t border-slate-700 pt-2"><span class="text-sm">房客應繳</span><span class="text-2xl font-black text-yellow-400">$ <span id="resAmount">0</span></span></div>
                </div>
                <button id="btnSubmit" onclick="submitToGas()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">確認同步至雲端</button>
            </div>
        </section>
        <section id="page-bill" class="page"><h2 class="text-xl font-black mb-4">🧾 帳單紀錄</h2><div id="historyContainer" class="space-y-4"></div></section>
    </div>
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-3 pb-6 z-50 no-print">
        <button onclick="switchPage('setup')" class="flex flex-col items-center gap-1 text-slate-400 focus:text-indigo-600"><span class="text-xl">⚙️</span><span class="text-[10px] font-bold">資產設定</span></button>
        <button onclick="switchPage('input')" class="flex flex-col items-center gap-1 text-slate-400 focus:text-indigo-600"><span class="text-xl">⚡</span><span class="text-[10px] font-bold">度數錄入</span></button>
        <button onclick="switchPage('bill')" class="flex flex-col items-center gap-1 text-slate-400 focus:text-indigo-600"><span class="text-xl">🧾</span><span class="text-[10px] font-bold">帳單紀錄</span></button>
    </nav>
    <script>
        let assets = JSON.parse(localStorage.getItem('tp_assets') || '{"locations":[]}');
        let config = JSON.parse(localStorage.getItem('tp_config') || '{"url":""}');
        function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); if(p === 'setup') renderAssets(); if(p === 'input') renderInputOptions(); if(p === 'bill') fetchHistory(); }
        function renderAssets() { document.getElementById('cfgUrl').value = config.url; document.getElementById('assetContainer').innerHTML = assets.locations.map(loc => `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200"><div class="flex justify-between font-black text-slate-800"><span>${loc.name}</span><button onclick="addRoom('${loc.id}')" class="text-xs text-indigo-500 font-bold">+房間</button></div><div class="mt-2 space-y-1">${loc.rooms.map(r => `<div class="text-sm text-slate-500">• ${r.name} (公電$${r.publicFee})</div>`).join('')}</div></div>`).join(''); }
        function addLocation() { const n = prompt('地點名稱'); if(n) { assets.locations.push({ id: 'loc_'+Date.now(), name: n, rooms: [] }); saveLocal(); } }
        function addRoom(id) { const l = assets.locations.find(x => x.id === id); const n = prompt('房號'); const k = prompt('初始度數','0'); const f = prompt('公電','0'); if(n) { l.rooms.push({ id:'rm_'+Date.now(), name:n, lastKwh:parseFloat(k), publicFee:parseFloat(f) }); saveLocal(); } }
        function saveCfg() { config.url = document.getElementById('cfgUrl').value; localStorage.setItem('tp_config', JSON.stringify(config)); alert('已儲存'); }
        function saveLocal() { localStorage.setItem('tp_assets', JSON.stringify(assets)); renderAssets(); }
        function renderInputOptions() { document.getElementById('selLoc').innerHTML = assets.locations.map(l => `<option value="${l.id}">${l.name}</option>`).join(''); updateRoomOptions(); }
        function updateRoomOptions() { const l = assets.locations.find(x => x.id === document.getElementById('selLoc').value); document.getElementById('selRoom').innerHTML = (l?.rooms || []).map(r => `<option value="${r.id}">${r.name}</option>`).join(''); loadLastReadings(); }
        function loadLastReadings() { const l = assets.locations.find(x => x.id === document.getElementById('selLoc').value); const r = l?.rooms.find(x => x.id === document.getElementById('selRoom').value); document.getElementById('valPrev').value = r?.lastKwh || 0; calculate(); }
        function calculate() { const p = parseFloat(document.getElementById('valPrev').value); const c = parseFloat(document.getElementById('valCurr').value || 0); const t = parseFloat(document.getElementById('billTotal').value || 0); const k = parseFloat(document.getElementById('billKwh').value || 1); if(c > 0) { const l = assets.locations.find(x => x.id === document.getElementById('selLoc').value); const r = l?.rooms.find(x => x.id === document.getElementById('selRoom').value); const amt = Math.round((c-p)*(t/k) + (r?.publicFee || 0)); document.getElementById('resAmount').innerText = amt.toLocaleString(); document.getElementById('resultBox').classList.remove('hidden'); } }
        async function submitToGas() { if(!config.url) return alert('未設定 URL'); const l = assets.locations.find(x => x.id === document.getElementById('selLoc').value); const r = l.rooms.find(x => x.id === document.getElementById('selRoom').value); const payload = { action:'saveMeterRecord', payload: { locId:l.id, locName:l.name, roomId:r.id, roomName:r.name, prev:parseFloat(document.getElementById('valPrev').value), curr:parseFloat(document.getElementById('valCurr').value), total:document.getElementById('resAmount').innerText } }; await fetch(config.url, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) }); r.lastKwh = payload.payload.curr; saveLocal(); alert('同步成功並回寫度數'); switchPage('bill'); }
        async function fetchHistory() { if(!config.url) return; const res = await fetch(config.url + '?action=getMeterRecords'); const json = await res.json(); document.getElementById('historyContainer').innerHTML = json.data.reverse().map(b => `<div class="bg-white p-4 rounded-xl border border-slate-200"><div class="flex justify-between font-black"><span>${b.roomName}</span><span class="text-indigo-600">$${b.total}</span></div><div class="text-[10px] text-slate-400">${b.locName} | 度數: ${b.prev}→${b.curr}</div></div>`).join(''); }
        renderInputOptions();
    </script>
</body>
</html>
