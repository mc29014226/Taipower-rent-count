<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台電租屋電費計算 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-4 border-blue-500">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">Taipower Project v2.0</h1>
        <p class="text-slate-400 mb-6 font-mono">環境：2026 累進費率模式</p>
        
        <div class="space-y-4 text-left">
            <label class="block text-sm text-slate-400">當月總用電度數 (kWh)</label>
            <input id="kwh" type="number" placeholder="例如: 450" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 text-blue-300 font-mono">
            <button onclick="calc()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition duration-200 shadow-lg">立即計算</button>
        </div>

        <div id="res-container" class="mt-8 hidden">
            <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
                <p class="text-slate-500 text-xs mb-1 uppercase">預估費用 (TWD)</p>
                <p id="res" class="text-4xl font-bold text-green-400 font-mono">$0</p>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const k = parseFloat(document.getElementById("kwh").value) || 0;
            let cost = 0;
            // 2026 累進費率範例邏輯
            if (k <= 120) {
                cost = k * 1.63;
            } else if (k <= 330) {
                cost = (120 * 1.63) + (k - 120) * 2.38;
            } else if (k <= 500) {
                cost = (120 * 1.63) + (210 * 2.38) + (k - 330) * 3.52;
            } else {
                cost = (120 * 1.63) + (210 * 2.38) + (170 * 3.52) + (k - 500) * 4.80;
            }
            
            document.getElementById("res-container").classList.remove("hidden");
            document.getElementById("res").innerText = "$" + Math.round(cost);
        }
    </script>
</body>
</html>
