<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台電分攤系統 v4.0 | Pro Equity</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 p-6 rounded-3xl shadow-2xl border border-slate-800">
        <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h1 class="text-xl font-black bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent italic">EQUITY PRO v4</h1>
            <a href="setup.html" class="text-[10px] text-slate-500 hover:text-emerald-400 transition-colors">⚙️ 設定資產</a>
        </header>

        <div class="space-y-4">
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-500 mb-1 uppercase tracking-widest">房產地點</label>
                    <select id="locationSelect" onchange="updateRoomOptions()" class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700 text-xs outline-none focus:border-emerald-500 transition-all"></select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 mb-1 uppercase tracking-widest">房間編號</label>
                    <select id="roomSelect" onchange="loadLastReading()" class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700 text-xs outline-none focus:border-emerald-500 transition-all"></select>
                </div>
            </div>

            
            <div class="p-3 bg-emerald-500/5 rounded-xl border border-emerald-500/10">
                <h2 class="text-[10px] font-bold text-emerald-500/60 mb-2">台電帳單基準</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <input id="billTotal" type="number" placeholder="帳單總金額" class="w-full p-2 bg-slate-950 rounded-lg border border-slate-800 text-xs focus:border-emerald-500 outline-none">
                    </div>
                    <div>
                        <input id="billKwh" type="number" placeholder="帳單總度數" class="w-full p-2 bg-slate-950 rounded-lg border border-slate-800 text-xs focus:border-emerald-500 outline-none">
                    </div>
                </div>
            </div>

            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-500 mb-1 italic">上次讀數</label>
                    <input id="lastReading" type="number" readonly class="w-full p-3 bg-slate-950 text-slate-500 rounded-xl border border-slate-900 text-lg font-mono cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-[10px] text-emerald-400 mb-1 font-bold">本次讀數</label>
                    <input id="currentReading" type="number" placeholder="度數" class="w-full p-3 bg-slate-800 rounded-xl border border-slate-700 text-lg font-mono outline-none focus:border-emerald-500">
                </div>
            </div>

            <button onclick="calculateEquity()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black text-white hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20 active:scale-95">計算分攤金額</button>

            <div id="resultCard" class="hidden space-y-3 pt-4 border-t border-slate-800">
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-[10px] text-slate-500">本期分攤總額</span>
                        <div id="finalAmount" class="text-4xl font-black text-emerald-400">$0</div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-slate-500">用電量 Delta</span>
                        <div id="usageText" class="text-lg font-bold text-white">0 kWh</div>
                    </div>
                </div>
                <div id="detailBox" class="text-[9px] text-slate-500 font-mono bg-black/20 p-3 rounded-lg leading-relaxed"></div>
                <button onclick="syncToGAS()" id="syncBtn" class="w-full py-2 bg-slate-800 rounded-lg text-[10px] font-bold text-slate-400 hover:text-white transition-all">☁️ 同步至雲端並更新歷史讀數</button>
            </div>
        </div>
    </div>

<script>
const getA = () => JSON.parse(localStorage.getItem("tp_assets") || "{\"locations\":[]}");
const getC = () => JSON.parse(localStorage.getItem("tp_config") || "{}");
window.onload = () => {
  const lS = document.getElementById("locationSelect");
  const a = getA();
  if(lS && a.locations.length > 0) {
    lS.innerHTML = a.locations.map(l => `<option value="${l.id}">${l.name}</option>`).join("");
    updateR();
  }
  ["currentReading", "billTotal", "billKwh"].forEach(id => document.getElementById(id)?.addEventListener("input", calc));
};
function updateR() {
  const lId = document.getElementById("locationSelect").value;
  const rS = document.getElementById("roomSelect");
  const loc = getA().locations.find(l => l.id === lId);
  rS.innerHTML = loc.rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join("");
  loadL();
}
function loadL() {
  const r = getR();
  if(r) document.getElementById("lastReading").value = r.lastKwh || 0;
  calc();
}
function getR() {
  const lId = document.getElementById("locationSelect").value;
  const rId = document.getElementById("roomSelect").value;
  const loc = getA().locations.find(l => l.id === lId);
  return loc ? loc.rooms.find(rm => rm.id === rId) : null;
}
function calc() {
  const last = parseFloat(document.getElementById("lastReading").value || 0);
  const curr = parseFloat(document.getElementById("currentReading").value || 0);
  const bT = parseFloat(document.getElementById("billTotal").value || 0);
  const bK = parseFloat(document.getElementById("billKwh").value || 0);
  const r = getR();
  const usage = Math.max(0, curr - last);
  const price = bK > 0 ? (bT / bK) : 0;
  const total = (usage * price) + (r ? r.publicFee : 0);
  document.getElementById("finalAmount").innerText = Math.round(total);
  document.getElementById("usageText").innerText = usage.toFixed(1);
  document.getElementById("detailBox").innerText = "單價: $" + price.toFixed(2);
}
async function syncToGAS() {
  const cfg = getC(); if(!cfg.gsUrl) return alert("未設定 GAS URL");
  const btn = document.getElementById("syncBtn"); btn.innerText = "同步中...";
  try {
    const p = { action:"sync", currentKwh: parseFloat(document.getElementById("currentReading").value) };
    await fetch(cfg.gsUrl, { method:"POST", mode:"no-cors", body: JSON.stringify(p) });
    const a = getA();
    a.locations.find(l => l.id === document.getElementById("locationSelect").value).rooms.find(rm => rm.id === document.getElementById("roomSelect").value).lastKwh = p.currentKwh;
    localStorage.setItem("tp_assets", JSON.stringify(a));
    alert("✅ 同步並更新完成！"); location.reload();
  } catch(e) { alert("❌ 失敗"); }
}
</script>
</body>
</html>
