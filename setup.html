<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 / 管理房間資料</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="bg-white rounded-2xl shadow p-6">
      <div class="flex items-center justify-between gap-3 mb-4">
        <div>
          <h1 class="text-2xl font-bold text-slate-900">設定 / 管理房間資料</h1>
          <p class="text-slate-500 mt-1">新增、修正、刪除房間初始值與帳單群組。</p>
        </div>
        <a href="./index.html" class="text-blue-600 hover:underline text-sm whitespace-nowrap">← 返回主頁</a>
      </div>

      <div id="statusBar" class="hidden rounded-xl px-4 py-3 text-sm font-medium mb-4"></div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium mb-1">地點</label>
          <input id="loc" placeholder="例如：我家" class="border rounded-xl p-3 w-full">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">房號</label>
          <input id="room" placeholder="例如：301" class="border rounded-xl p-3 w-full">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">帳單群組</label>
          <input id="billGroup" placeholder="例如：三樓、四樓" class="border rounded-xl p-3 w-full">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">上期度數</label>
          <input id="last" placeholder="例如：1000" type="number" class="border rounded-xl p-3 w-full">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">公電費</label>
          <input id="fee" placeholder="例如：100" type="number" class="border rounded-xl p-3 w-full">
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button id="saveBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl">
          新增資料
        </button>
        <button id="clearBtn" class="bg-slate-500 hover:bg-slate-600 text-white px-4 py-2 rounded-xl">
          清空欄位
        </button>
        <button id="reloadBtn" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl">
          從雲端載入
        </button>
        <button id="syncBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl">
          同步到雲端
        </button>
      </div>

      <div class="mt-6 border-t pt-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-3">
          <div>
            <h2 class="text-lg font-bold">目前資料</h2>
            <div class="text-sm text-slate-500">
              共 <span id="countText">0</span> 筆
            </div>
          </div>

          <div class="w-full md:w-72">
            <label class="block text-sm font-medium mb-1">依地點篩選</label>
            <select id="locationFilter" class="border rounded-xl p-3 w-full bg-white">
              <option value="">全部地點</option>
            </select>
          </div>
        </div>

        <div id="emptyText" class="text-slate-400 text-sm">目前沒有資料</div>
        <div id="list" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW-Cv2scTGNwTv68xGhIpvYy5m0Hfn-bwWsLeRKdIRLnPuaooK8jRS4uiy6WTQnW4aXg/exec';
    const STORAGE_KEY = 'assets';

    const el = {
      loc: document.getElementById('loc'),
      room: document.getElementById('room'),
      billGroup: document.getElementById('billGroup'),
      last: document.getElementById('last'),
      fee: document.getElementById('fee'),
      saveBtn: document.getElementById('saveBtn'),
      clearBtn: document.getElementById('clearBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      syncBtn: document.getElementById('syncBtn'),
      list: document.getElementById('list'),
      emptyText: document.getElementById('emptyText'),
      countText: document.getElementById('countText'),
      locationFilter: document.getElementById('locationFilter'),
      statusBar: document.getElementById('statusBar')
    };

    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let editIndex = -1;

    function showStatus(message, type = 'info') {
      el.statusBar.classList.remove(
        'hidden',
        'bg-blue-50', 'text-blue-700',
        'bg-red-50', 'text-red-700',
        'bg-green-50', 'text-green-700',
        'bg-amber-50', 'text-amber-700'
      );

      if (type === 'success') {
        el.statusBar.classList.add('bg-green-50', 'text-green-700');
      } else if (type === 'error') {
        el.statusBar.classList.add('bg-red-50', 'text-red-700');
      } else if (type === 'warning') {
        el.statusBar.classList.add('bg-amber-50', 'text-amber-700');
      } else {
        el.statusBar.classList.add('bg-blue-50', 'text-blue-700');
      }

      el.statusBar.textContent = message;
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function clearForm() {
      el.loc.value = '';
      el.room.value = '';
      el.billGroup.value = '';
      el.last.value = '';
      el.fee.value = '';
      editIndex = -1;
      el.saveBtn.textContent = '新增資料';
    }

    function normalizeItem(item) {
      return {
        location: String(item.location || '').trim(),
        room: String(item.room || '').trim(),
        billGroup: String(item.billGroup || '').trim(),
        lastKwh: Number(item.lastKwh || 0),
        publicFee: Number(item.publicFee || 0)
      };
    }

    function getUniqueLocations() {
      return [...new Set(
        data
          .map(item => String(item.location || '').trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, 'zh-Hant'));
    }

    function renderLocationFilter() {
      const currentValue = el.locationFilter.value;

      el.locationFilter.innerHTML = '<option value="">全部地點</option>';

      getUniqueLocations().forEach(location => {
        const option = document.createElement('option');
        option.value = location;
        option.textContent = location;
        el.locationFilter.appendChild(option);
      });

      const stillExists = getUniqueLocations().includes(currentValue);
      el.locationFilter.value = stillExists ? currentValue : '';
    }

    function renderList() {
      el.list.innerHTML = '';

      const filterLocation = String(el.locationFilter.value || '').trim();

      const filteredData = filterLocation
        ? data.filter(item => String(item.location || '').trim() === filterLocation)
        : data.slice();

      el.countText.textContent = filteredData.length;

      if (!filteredData.length) {
        el.emptyText.classList.remove('hidden');
        return;
      }

      el.emptyText.classList.add('hidden');

      const grouped = {};

      filteredData.forEach(item => {
        const location = item.location || '未分類';
        if (!grouped[location]) {
          grouped[location] = [];
        }

        const originalIndex = data.findIndex((row, idx) =>
          idx >= 0 &&
          row.location === item.location &&
          row.room === item.room &&
          row.billGroup === item.billGroup &&
          Number(row.lastKwh) === Number(item.lastKwh) &&
          Number(row.publicFee) === Number(item.publicFee)
        );

        grouped[location].push({ ...item, _index: originalIndex });
      });

      Object.keys(grouped)
        .sort((a, b) => a.localeCompare(b, 'zh-Hant'))
        .forEach(location => {
          const section = document.createElement('div');
          section.className = 'mb-6';

          const header = document.createElement('div');
          header.className = 'flex items-center justify-between mb-3 px-1';
          header.innerHTML = `
            <h3 class="text-xl font-bold text-slate-800">📍 ${escapeHtml(location)}</h3>
            <span class="text-sm text-slate-500">共 ${grouped[location].length} 間</span>
          `;
          section.appendChild(header);

          const roomWrap = document.createElement('div');
          roomWrap.className = 'space-y-3';

          grouped[location]
            .sort((a, b) => {
              if (a.billGroup !== b.billGroup) {
                return String(a.billGroup).localeCompare(String(b.billGroup), 'zh-Hant');
              }
              return String(a.room).localeCompare(String(b.room), 'zh-Hant', { numeric: true });
            })
            .forEach(item => {
              const card = document.createElement('div');
              card.className = 'bg-slate-50 border rounded-2xl p-4';

              card.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                  <div>
                    <div class="text-lg font-bold text-slate-900">${escapeHtml(item.room)}</div>
                    <div class="text-sm text-slate-600 mt-1">帳單群組：${escapeHtml(item.billGroup || '-')}</div>
                    <div class="text-sm text-slate-600">上期度數：${Number(item.lastKwh)} 度</div>
                    <div class="text-sm text-slate-600">公電費：${Number(item.publicFee)} 元</div>
                  </div>
                  <div class="flex gap-2">
                    <button class="edit-btn bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-2 rounded-xl" data-index="${item._index}">修正</button>
                    <button class="delete-btn bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-xl" data-index="${item._index}">刪除</button>
                  </div>
                </div>
              `;

              roomWrap.appendChild(card);
            });

          section.appendChild(roomWrap);
          el.list.appendChild(section);
        });

      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => editItem(Number(btn.dataset.index)));
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => removeItem(Number(btn.dataset.index)));
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function addOrUpdate() {
      const item = normalizeItem({
        location: el.loc.value,
        room: el.room.value,
        billGroup: el.billGroup.value,
        lastKwh: el.last.value,
        publicFee: el.fee.value
      });

      if (!item.location) {
        showStatus('請輸入地點。', 'error');
        return;
      }

      if (!item.room) {
        showStatus('請輸入房號。', 'error');
        return;
      }

      if (!item.billGroup) {
        showStatus('請輸入帳單群組。', 'error');
        return;
      }

      if (!Number.isFinite(item.lastKwh) || item.lastKwh < 0) {
        showStatus('上期度數請輸入 0 以上的數字。', 'error');
        return;
      }

      if (!Number.isFinite(item.publicFee) || item.publicFee < 0) {
        showStatus('公電費請輸入 0 以上的數字。', 'error');
        return;
      }

      const duplicateIndex = data.findIndex((row, index) =>
        row.location === item.location &&
        row.room === item.room &&
        row.billGroup === item.billGroup &&
        index !== editIndex
      );

      if (duplicateIndex >= 0) {
        showStatus('相同地點、房號、帳單群組已存在，請直接使用修正功能。', 'warning');
        return;
      }

      if (editIndex >= 0) {
        data[editIndex] = item;
        showStatus('資料已修正。', 'success');
      } else {
        data.push(item);
        showStatus('資料已新增。', 'success');
      }

      saveLocal();
      clearForm();
      renderLocationFilter();
      renderList();
    }

    function editItem(index) {
      const item = data[index];
      if (!item) return;

      el.loc.value = item.location ?? '';
      el.room.value = item.room ?? '';
      el.billGroup.value = item.billGroup ?? '';
      el.last.value = item.lastKwh ?? '';
      el.fee.value = item.publicFee ?? '';
      editIndex = index;
      el.saveBtn.textContent = '儲存修正';

      window.scrollTo({ top: 0, behavior: 'smooth' });
      showStatus(`正在修正：${item.location} / ${item.room}`, 'info');
    }

    function removeItem(index) {
      const item = data[index];
      if (!item) return;

      const ok = confirm(`確定要刪除「${item.location} / ${item.room} / ${item.billGroup}」嗎？`);
      if (!ok) return;

      data.splice(index, 1);
      saveLocal();
      clearForm();
      renderLocationFilter();
      renderList();
      showStatus('資料已刪除。', 'success');
    }

    async function loadFromCloud() {
      try {
        el.reloadBtn.disabled = true;
        el.reloadBtn.textContent = '載入中...';

        const response = await fetch(`${GAS_URL}?action=getAssets`);
        const result = await response.json();

        data = Array.isArray(result.data) ? result.data.map(normalizeItem) : [];
        saveLocal();
        clearForm();
        renderLocationFilter();
        renderList();
        showStatus('已成功從雲端載入資料。', 'success');
      } catch (error) {
        showStatus(`雲端載入失敗：${error.message}`, 'error');
      } finally {
        el.reloadBtn.disabled = false;
        el.reloadBtn.textContent = '從雲端載入';
      }
    }

    async function syncToCloud() {
      try {
        el.syncBtn.disabled = true;
        el.syncBtn.textContent = '同步中...';

        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'saveAssets',
            payload: data
          })
        });

        const result = await response.json();

        if (result.success === false) {
          throw new Error(result.message || '同步失敗');
        }

        saveLocal();
        showStatus('已成功同步到雲端。', 'success');
      } catch (error) {
        showStatus(`同步失敗：${error.message}`, 'error');
      } finally {
        el.syncBtn.disabled = false;
        el.syncBtn.textContent = '同步到雲端';
      }
    }

    function bindEvents() {
      el.saveBtn.addEventListener('click', addOrUpdate);
      el.clearBtn.addEventListener('click', () => {
        clearForm();
        showStatus('欄位已清空。', 'info');
      });
      el.reloadBtn.addEventListener('click', loadFromCloud);
      el.syncBtn.addEventListener('click', syncToCloud);
      el.locationFilter.addEventListener('change', renderList);
    }

    function init() {
      renderLocationFilter();
      renderList();
      bindEvents();
      showStatus('已載入本機資料。', 'info');
    }

    init();
  </script>
</body>
</html>
