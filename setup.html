<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產管理 | Taipower Pro Equity</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent italic">PRO ASSETS v4</h1>
            <a href="index.html" class="text-xs text-slate-500 hover:text-emerald-400 transition-colors">← 返回權重計算器</a>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl h-fit">
                <h2 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">全域設定</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] text-slate-500 mb-1">GAS API URL</label>
                        <input id="globalGsUrl" type="text" class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700 focus:border-emerald-500 outline-none text-xs transition-all">
                    </div>
                    <button onclick="saveGlobalConfig()" class="w-full bg-emerald-600/10 text-emerald-400 p-2 rounded-lg font-bold border border-emerald-600/30 hover:bg-emerald-600 hover:text-white transition-all text-xs">儲存雲端參數</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-white">房產地點清單</h2>
                    <button onclick="addLocation()" class="bg-emerald-600 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-emerald-500 transition-all">+ 新增地點</button>
                </div>
                <div id="assetContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let assets = JSON.parse(localStorage.getItem('tp_assets') || '{"locations": []}');

        function saveAssets() {
            localStorage.setItem('tp_assets', JSON.stringify(assets));
            render();
        }

        function saveGlobalConfig() {
            const url = document.getElementById('globalGsUrl').value;
            localStorage.setItem('tp_config', JSON.stringify({ gsUrl: url }));
            alert('全域設定已持久化！');
        }

        function addLocation() {
            const name = prompt('請輸入地點名稱：');
            if (name) {
                assets.locations.push({ id: crypto.randomUUID(), name, rooms: [] });
                saveAssets();
            }
        }

        function addRoom(locId) {
            const name = prompt('請輸入房號：');
            const fee = prompt('請輸入每月公設費：', '0');
            const lastKwh = prompt('請輸入目前電表起算讀數：', '0');
            if (name) {
                const loc = assets.locations.find(l => l.id === locId);
                loc.rooms.push({ 
                    id: crypto.randomUUID(), 
                    name, 
                    publicFee: parseFloat(fee) || 0,
                    lastKwh: parseFloat(lastKwh) || 0
                });
                saveAssets();
            }
        }

        function deleteLocation(id) {
            if (confirm('確定刪除？')) {
                assets.locations = assets.locations.filter(l => l.id !== id);
                saveAssets();
            }
        }

        function render() {
            const container = document.getElementById('assetContainer');
            container.innerHTML = assets.locations.map(loc => `
                <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                    <div class="p-4 bg-slate-800/50 flex justify-between items-center">
                        <span class="font-bold text-slate-200">${loc.name}</span>
                        <div class="flex gap-2">
                            <button onclick="addRoom('${loc.id}')" class="text-[10px] bg-slate-700 px-2 py-1 rounded hover:bg-slate-600 transition-all">新增房間</button>
                            <button onclick="deleteLocation('${loc.id}')" class="text-[10px] text-red-500 px-2 py-1">刪除地點</button>
                        </div>
                    </div>
                    <div class="p-4 space-y-2">
                        ${loc.rooms.map(room => `
                            <div class="flex justify-between items-center text-xs bg-slate-800/30 p-2 rounded-lg border border-slate-800">
                                <span>房號: <b class="text-emerald-400">${room.name}</b></span>
                                <div class="flex gap-4">
                                    <span>公設: <b class="text-slate-400">$${room.publicFee}</b></span>
                                    <span>當前讀數: <b class="text-cyan-400">${room.lastKwh} kWh</b></span>
                                </div>
                            </div>
                        `).join('') || '<p class="text-[10px] text-slate-600 italic text-center py-2">尚無房間</p>'}
                    </div>
                </div>
            `).join('');
            
            const config = JSON.parse(localStorage.getItem('tp_config') || '{}');
            document.getElementById('globalGsUrl').value = config.gsUrl || '';
        }

        window.onload = render;
    </script>
</body>
</html>
