<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>設定資料</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 bg-slate-100">
<div class="max-w-xl mx-auto space-y-3">

<h1 class="text-xl font-bold">資產設定</h1>

<input id="locName" placeholder="地點名稱" class="w-full p-2 border rounded">
<input id="address" placeholder="地址" class="w-full p-2 border rounded">
<input id="roomName" placeholder="房號" class="w-full p-2 border rounded">
<input id="lastKwh" placeholder="上期度數" type="number" class="w-full p-2 border rounded">
<input id="publicFee" placeholder="公電費" type="number" class="w-full p-2 border rounded">

<button onclick="add()" class="bg-blue-500 text-white p-2 w-full rounded">新增</button>
<button onclick="sync()" class="bg-green-500 text-white p-2 w-full rounded">同步到雲端</button>

</div>

<script>
const GS = "你的GAS網址";
let data = [];

function add(){
    data.push({
        locationId: Date.now(),
        locationName: locName.value,
        address: address.value,
        roomId: Date.now()+1,
        roomName: roomName.value,
        lastKwh: Number(lastKwh.value),
        publicFee: Number(publicFee.value)
    });
    localStorage.setItem("assets", JSON.stringify(data));
    alert("已新增");
}

async function sync(){
    await fetch(GS,{
        method:"POST",
        body:JSON.stringify({action:"saveAssets",payload:data})
    });
    alert("已同步");
}
</script>
</body>
</html>
