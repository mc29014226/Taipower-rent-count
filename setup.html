<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 bg-gray-100">
<h1 class="text-xl font-bold mb-4">設定資料</h1>

<input id="loc" placeholder="地點" class="border p-2 w-full mb-2">
<input id="room" placeholder="房號" class="border p-2 w-full mb-2">
<input id="last" placeholder="上期度數" type="number" class="border p-2 w-full mb-2">
<input id="fee" placeholder="公電費" type="number" class="border p-2 w-full mb-2">

<button onclick="add()" class="bg-blue-500 text-white p-2 w-full mb-2">新增</button>
<button onclick="sync()" class="bg-green-500 text-white p-2 w-full">同步到雲端</button>

<script>
const GS="https://script.google.com/macros/s/AKfycbzW-Cv2scTGNwTv68xGhIpvYy5m0Hfn-bwWsLeRKdIRLnPuaooK8jRS4uiy6WTQnW4aXg/exec";

let data=JSON.parse(localStorage.getItem("assets")||"[]");

function add(){
data.push({
locationId:loc.value,
locationName:loc.value,
roomId:room.value,
roomName:room.value,
lastKwh:Number(last.value),
publicFee:Number(fee.value)
});
localStorage.setItem("assets",JSON.stringify(data));
alert("已新增");
}

async function sync(){
await fetch(GS,{
method:"POST",
body:JSON.stringify({action:"saveAssets",payload:data})
});
alert("已同步");
}
</script>
</body>
</html>
